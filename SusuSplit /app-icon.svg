<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Sleek Dark Background Layer -->
  <rect width="512" height="512" rx="110" fill="#141414" stroke="#00cc66" stroke-width="4" />
  
  <!-- Subtle inner gradient glow for depth -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cc66" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00cc66" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="220" fill="url(#glow)" />

  <!-- Dynamic Split-S Geometric Logo Mark -->
  <g stroke="#00cc66" stroke-width="32" stroke-linecap="round" fill="none">
    <!-- Top curve of the S (Left to Right) -->
    <path d="M 160 200 A 64 64 0 0 1 320 160 A 64 64 0 0 1 352 230" stroke-dasharray="120 40" />
    
    <!-- Sharp diagonal split slash through the center -->
    <line x1="320" y1="180" x2="192" y2="332" stroke="#ffffff" stroke-width="24" />
    
    <!-- Bottom curve of the S (Right to Left) -->
    <path d="M 352 312 A 64 64 0 0 1 192 352 A 64 64 0 0 1 160 282" stroke-dasharray="120 40" />
  </g>

  <!-- Central Balance Hub Dot -->
  <circle cx="256" cy="256" r="16" fill="#00cc66" />
</svg>
