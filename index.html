<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SusuSplit | Financial Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root { --accent: #00ff66; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .dashboard { background: var(--card); padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
        h1 { color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>SusuSplit</h1>
        <p>Ledger Calculation</p>
        <input type="number" id="amount" placeholder="Total Amount ($)">
        <input type="number" id="people" placeholder="Participants">
        <button onclick="calculate()">SPLIT TRANSACTION</button>
        <h2 id="result"></h2>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        function calculate() {
            const res = (document.getElementById('amount').value / document.getElementById('people').value).toFixed(2);
            document.getElementById('result').innerText = isNaN(res) ? "" : "Share: $" + res;
        }
    </script>
</body>
</html>
