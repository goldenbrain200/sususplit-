<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0,
          maximum-scale=1.0,
          user-scalable=no">

    <title>SusuSplit Open Ledger</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="app-icon.svg">
    <link rel="apple-touch-icon" href="app-icon.svg">

    <meta name="theme-color" content="#00cc66">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            background-color:#0d0d0d;
            color:#ffffff;
            font-family:-apple-system,
            BlinkMacSystemFont,
            'Segoe UI',
            Roboto,
            sans-serif;
            padding:16px;
            min-height:100vh;
        }

        .app-container{
            background-color:#1a1a1a;
            width:100%;
            max-width:450px;
            margin:0 auto 30px auto;
            border-radius:20px;
            border:1px solid #00cc66;
            box-shadow:0 8px 24px rgba(0,204,102,0.15);
            padding:20px;
        }

        h2{
            font-size:24px;
            color:#00cc66;
            font-weight:700;
            margin-bottom:4px;
        }

        p.subtitle{
            color:#a6a6a6;
            font-size:13px;
            margin-bottom:20px;
        }

        .connection-box{
            background-color:#222;
            padding:14px;
            border-radius:12px;
            margin-bottom:20px;
            border:1px dashed #00cc66;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .status-dot{
            display:inline-block;
            width:8px;
            height:8px;
            background-color:#ff4d4d;
            border-radius:50%;
            margin-right:6px;
        }

        .status-dot.online{
            background-color:#00cc66;
        }

        .tab-container{
            display:flex;
            background-color:#262626;
            padding:4px;
            border-radius:12px;
            margin-bottom:20px;
            border:1px solid #333333;
        }

        .tab-btn{
            flex:1;
            padding:12px 8px;
            background:none;
            border:none;
            color:#a6a6a6;
            font-size:13px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
        }

        .tab-btn.active{
            background-color:#00cc66;
            color:#000000;
        }

        .input-group{
            margin-bottom:16px;
        }

        label{
            display:block;
            margin-bottom:6px;
            color:#00cc66;
            font-size:12px;
            font-weight:600;
            text-transform:uppercase;
        }

        input,
        select{
            width:100%;
            padding:12px;
            background-color:#262626;
            border:1px solid #3d3d3d;
            border-radius:10px;
            color:#ffffff;
            font-size:15px;
            outline:none;
        }

        .row{
            display:flex;
            gap:12px;
        }

        .row .input-group{
            flex:1;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #a6a6a6;
            cursor: pointer;
        }

        .checkbox-container input {
            width: auto;
        }

        .btn-action{
            background:linear-gradient(
                135deg,
                #00cc66 0%,
                #00994d 100%
            );

            color:#000000;
            border:none;
            padding:14px;
            border-radius:10px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            width:100%;
            margin-top:8px;
            margin-bottom:20px;
        }

        .btn-secondary{
            background:#333;
            color:#fff;
            border:none;
            padding:6px 12px;
            border-radius:8px;
            font-size:11px;
            cursor:pointer;
            font-weight:bold;
        }

        .results-section{
            border-top:1px solid #2d2d2d;
            padding-top:16px;
            margin-bottom:20px;
        }

        .section-title{
            font-size:15px;
            font-weight:bold;
            color:#ffffff;
            margin-bottom:12px;
        }

        .member-row{
            background-color:#1e1e1e;
            padding:12px;
            border-radius:10px;
            margin-bottom:8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border:1px solid #2d2d2d;
        }

        .member-name{
            font-size:15px;
            font-weight:600;
        }

        .balance-display{
            text-align:right;
            font-size:14px;
            font-weight:bold;
        }

        .status-positive{
            color:#00cc66;
        }

        .status-negative{
            color:#ff4d4d;
        }

        .status-neutral{
            color:#8a8a8a;
        }

        .ledger-section{
            border-top:1px solid #2d2d2d;
            padding-top:16px;
        }

        .ledger-item{
            background-color:#161616;
            border:1px dashed #333333;
            padding:12px;
            border-radius:10px;
            margin-bottom:8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .ledger-details{
            display:flex;
            flex-direction:column;
            gap:2px;
        }

        .ledger-title{
            font-size:13px;
        }

        .ledger-sub{
            font-size:11px;
            color:#666666;
        }

        .ledger-val{
            font-size:13px;
            font-weight:bold;
        }

        .text-green{
            color:#00cc66;
        }

        .text-yellow{
            color:#ffaa00;
        }
    </style>
    <link rel="manifest" href="manifest.json">

</head>

<body>

<div class="app-container">

    <h2>SusuSplit</h2>

    <p class="subtitle">
        Cloud-connected hostel room ledger.
    </p>

    <div id="linkScreen">
        <div class="input-group">
            <label for="roomCodeInput">
                Enter Hostel Room Code
            </label>
            <input type="text"
                   id="roomCodeInput"
                   placeholder="e.g., CAMPUS-404"
                   value="CAMPUS-404">
        </div>

        <div class="input-group">
            <label for="currentUserInput">
                Your Name
            </label>
            <input type="text"
                   id="currentUserInput"
                   placeholder="Enter your name">
        </div>

        <button class="btn-action"
                onclick="connectToRoomUI()">
            Link Into Group
        </button>
    </div>

    <div id="appContent" style="display:none;">

        <div class="connection-box">
            <div>
                <span class="status-dot online"></span>
                <span id="roomDisplay" style="font-size:13px;"></span>
                <div id="userProfileDisplay"
                     style="font-size:11px;
                     color:#a6a6a6;
                     margin-top:2px;">
                </div>
            </div>

            <button class="btn-secondary"
                    onclick="exitRoom()">
                Disconnect
            </button>
        </div>

        <div class="tab-container">
            <button class="tab-btn active"
                    id="tabExpense"
                    onclick="switchMode('expense')">
                Shared Expense
            </button>

            <button class="tab-btn"
                    id="tabPayment"
                    onclick="switchMode('payment')">
                Direct Repayment
            </button>
        </div>

        <div id="expenseForm">
            <div class="input-group">
                <label for="payer">
                    Who Paid?
                </label>
                <select id="payer"></select>
            </div>

            <div class="input-group">
                <label for="category">
                    What was bought?
                </label>
                <select id="category">
                    <option>Food & Provisions</option>
                    <option>Hostel Shared Items</option>
                    <option>Fuel / Transport</option>
                    <option>Data Bundles</option>
                </select>
            </div>

            <div class="input-group">
                <label for="amount">
                    Total Cost (GH₵)
                </label>
                <input type="number"
                       id="amount">
            </div>

            <button class="btn-action"
                    onclick="addExpense()">
                Add & Broadcast Split
            </button>
        </div>

        <div id="paymentForm"
             style="display:none;">

            <div class="checkbox-container">
                <input type="checkbox" id="proxyToggle" onchange="toggleProxyPayment()">
                <label style="display:inline; text-transform:none; font-size:13px;" for="proxyToggle">
                    I am paying for a roommate whose phone is offline
                </label>
            </div>

            <div class="input-group" id="senderContainer" style="display:none;">
                <label for="sender">
                    Who is paying?
                </label>
                <select id="sender" onchange="rebuildDynamicDropdowns()"></select>
            </div>

            <div class="input-group">
                <label for="receiver">
                    Who are you paying?
                </label>
                <select id="receiver"></select>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="payAmount">
                        Amount (GH₵)
                    </label>
                    <input type="number"
                           id="payAmount">
                </div>

                <div class="input-group">
                    <label for="momoRef">
                        MoMo Ref
                    </label>
                    <input type="text"
                           id="momoRef">
                </div>
            </div>

            <button class="btn-action"
                    onclick="settleDebtDirect()">
                Log & Broadcast Repayment
            </button>
        </div>

        <div class="results-section">
            <div class="section-title">
                Group Standings
            </div>
            <div id="balancesGrid"></div>
        </div>

        <div class="ledger-section">
            <div class="section-title">
                Live Room Activity Stream
            </div>
            <div id="historyLog"></div>
        </div>

    </div>

</div>

<script>

const URL_TARGET = 'https://vgtmpvworduaipcjwbym.supabase.co';
const KEY_TARGET = 'sb_publishable_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndG1wdndvcmR1YWlwY2p3YnltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODg3NzcsImV4cCI6MjAzMjQ2NDc3N30.R_64vHsc7L7tMeymQpY4_C24rW0I7A_g1mUfUclM3H4';

let supabaseClient = null;
let myIdentity = "";
let currentRoom = "";

let groupBalances = {
    "Osborn":0,
    "Kofi":0,
    "Ama":0,
    "Kojo":0,
    "Yaw":0
};

// Initialize client safely only when the browser window finishes loading dependencies
window.onload = function() {
    try {
        if (window.supabase && typeof window.supabase.createClient === 'function') {
            supabaseClient = window.supabase.createClient(URL_TARGET, KEY_TARGET);
        }
    } catch(e) {
        console.error("Supabase module load delay: ", e);
    }
};

function connectToRoomUI(){
    const codeVal = document.getElementById('roomCodeInput').value.trim();
    const nameVal = document.getElementById('currentUserInput').value.trim();

    if(!codeVal || !nameVal){
        alert("Please fill out both inputs!");
        return;
    }

    currentRoom = codeVal.toUpperCase();
    myIdentity = nameVal.charAt(0).toUpperCase() + nameVal.slice(1);

    document.getElementById('roomDisplay').innerText = "Room: " + currentRoom;
    document.getElementById('userProfileDisplay').innerText = "Active User: " + myIdentity;

    document.getElementById('linkScreen').style.display = "none";
    document.getElementById('appContent').style.display = "block";

    rebuildDynamicDropdowns();
    updateBalancesUI();
}

function exitRoom(){
    document.getElementById('linkScreen').style.display = "block";
    document.getElementById('appContent').style.display = "none";
}

function rebuildDynamicDropdowns(){
    const members = Object.keys(groupBalances);
    const payer = document.getElementById('payer');
    const sender = document.getElementById('sender');
    const receiver = document.getElementById('receiver');

    // Safe protection to ensure lists don't crash before inputs are generated
    if (!payer || !sender || !receiver) return;

    const isProxyMode = document.getElementById('proxyToggle').checked;

    // Preserve selections to prevent jumping menus
    const oldPayer = payer.value;
    const oldSender = sender.value;
    const oldReceiver = receiver.value;

    payer.innerHTML = "";
    sender.innerHTML = "";
    
    members.forEach(name=>{
        payer.innerHTML += `<option value="${name}">${name}</option>`;
        if(name !== myIdentity) {
            sender.innerHTML += `<option value="${name}">${name}</option>`;
        }
    });

    if (oldPayer) payer.value = oldPayer;
    if (oldSender) sender.value = oldSender;

    // Resolve current sender assignment safely
    const activeSender = isProxyMode ? (sender.value || members[1]) : myIdentity;

    receiver.innerHTML = "";
    members.forEach(name => {
        if(name !== activeSender) {
            receiver.innerHTML += `<option value="${name}">${name}</option>`;
        }
    });

    if (oldReceiver && oldReceiver !== activeSender) receiver.value = oldReceiver;
}

function toggleProxyPayment() {
    const isChecked = document.getElementById('proxyToggle').checked;
    document.getElementById('senderContainer').style.display = isChecked ? 'block' : 'none';
    rebuildDynamicDropdowns();
}

function updateBalancesUI(){
    const grid = document.getElementById('balancesGrid');
    if (!grid) return;
    grid.innerHTML = "";

    Object.keys(groupBalances)
    .forEach(name=>{
        let bal = groupBalances[name];
        let cls = "status-neutral";
        let text = "Settled";

        if(bal > 0){
            cls = "status-positive";
            text = "+ GH₵ " + bal.toFixed(2);
        }

        if(bal < 0){
            cls = "status-negative";
            text = "- GH₵ " + Math.abs(bal).toFixed(2);
        }

        grid.innerHTML += `
        <div class="member-row">
            <div class="member-name">${name}</div>
            <div class="balance-display ${cls}">${text}</div>
        </div>
        `;
    });
}

function pushDatabaseBalances(){
    if(!supabaseClient || !currentRoom) return;

    supabaseClient
    .from('groups')
    .update({
        osborn_bal: groupBalances["Osborn"],
        kofi_bal: groupBalances["Kofi"],
        ama_bal: groupBalances["Ama"],
        kojo_bal: groupBalances["Kojo"],
        yaw_bal: groupBalances["Yaw"]
    })
    .eq('room_code', currentRoom)
    .then(()=>{});
}

function addExpense(){
    const payer = document.getElementById('payer').value;
    const category = document.getElementById('category').value;
    const amount = parseFloat(document.getElementById('amount').value);

    if(isNaN(amount) || amount <= 0){
        alert("Invalid amount");
        return;
    }

    const members = Object.keys(groupBalances);
    const share = amount / members.length;

    members.forEach(name=>{
        groupBalances[name] -= share;
    });

    groupBalances[payer] += amount;

    updateBalancesUI();
    pushDatabaseBalances();

    document.getElementById('historyLog').innerHTML += `
    <div class="ledger-item">
        <div class="ledger-details">
            <div class="ledger-title">
                <strong>${payer}</strong> bought <strong>${category}</strong>
            </div>
            <div class="ledger-sub">Shared Expense Added</div>
        </div>
        <div class="ledger-val text-green">GH₵ ${amount.toFixed(2)}</div>
    </div>
    `;
}

function settleDebtDirect(){
    const isProxyMode = document.getElementById('proxyToggle').checked;
    const sender = isProxyMode ? document.getElementById('sender').value : myIdentity;
    const receiver = document.getElementById('receiver').value;
    const amount = parseFloat(document.getElementById('payAmount').value);
    const ref = document.getElementById('momoRef').value;

    if(sender === receiver){
        alert("Sender and receiver cannot match");
        return;
    }

    if(isNaN(amount) || amount <= 0){
        alert("Invalid amount");
        return;
    }

    groupBalances[sender] += amount;
    groupBalances[receiver] -= amount;

    updateBalancesUI();
    pushDatabaseBalances();

    document.getElementById('historyLog').innerHTML += `
    <div class="ledger-item">
        <div class="ledger-details">
            <div class="ledger-title">
                <strong>${sender}</strong> paid <strong>${receiver}</strong>
            </div>
            <div class="ledger-sub">${ref || "Direct Repayment"}</div>
        </div>
        <div class="ledger-val text-yellow">GH₵ ${amount.toFixed(2)}</div>
    </div>
    `;
}

function switchMode(mode){
    const expenseForm = document.getElementById('expenseForm');
    const paymentForm = document.getElementById('paymentForm');
    const tabExpense = document.getElementById('tabExpense');
    const tabPayment = document.getElementById('tabPayment');

    if(mode === "expense"){
        expenseForm.style.display = "block";
        paymentForm.style.display = "none";
        tabExpense.classList.add("active");
        tabPayment.classList.remove("active");
    }else{
        expenseForm.style.display = "none";
        paymentForm.style.display = "block";
        tabExpense.classList.remove("active");
        tabPayment.classList.add("active");
    }
}

</script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!'))
        .catch(err => console.log('Registration failed: ', err));
    });
  }
    </script>
    
</body>
</html>
